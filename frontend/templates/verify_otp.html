<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verify Email — Smart AI Recruitment</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/glass.css">
</head>
<body>
<div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
<div class="g-auth-page">
  <div class="g-auth-box" style="max-width:420px;width:100%;text-align:center">
    <div style="font-size:56px;margin-bottom:16px">📧</div>
    <div class="auth-title">Check your email</div>
    <div class="auth-sub">We sent a 6-digit OTP to</div>
    <div id="email-show" style="color:var(--cyan);font-weight:600;font-size:14px;margin-bottom:4px"></div>
    <div class="otp-row">
      <input type="text" maxlength="1" class="otp-inp" data-i="0">
      <input type="text" maxlength="1" class="otp-inp" data-i="1">
      <input type="text" maxlength="1" class="otp-inp" data-i="2">
      <input type="text" maxlength="1" class="otp-inp" data-i="3">
      <input type="text" maxlength="1" class="otp-inp" data-i="4">
      <input type="text" maxlength="1" class="otp-inp" data-i="5">
    </div>
    <button class="btn-glass btn-primary btn-block btn-lg" id="verify-btn" onclick="doVerify()">Verify OTP →</button>
    <div style="margin-top:16px;font-size:13px;color:rgba(255,255,255,.4)">Didn't receive? <button onclick="resend()" style="background:none;border:none;color:var(--cyan);cursor:pointer;font-weight:600">Resend OTP</button></div>
    <div style="margin-top:12px"><a href="/login" style="font-size:12px;color:rgba(255,255,255,.35);text-decoration:none">← Back to login</a></div>
  </div>
</div>
<script src="/static/js/glass-app.js"></script>
<script>
const params=new URLSearchParams(location.search),email=params.get('email')||'';
document.getElementById('email-show').textContent=email;
const inps=[...document.querySelectorAll('.otp-inp')];
inps.forEach((inp,i)=>{
  inp.addEventListener('input',()=>{inp.value=inp.value.replace(/\D/g,'');if(inp.value&&i<5)inps[i+1].focus();});
  inp.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!inp.value&&i>0)inps[i-1].focus();});
});
function getOTP(){return inps.map(i=>i.value).join('');}
async function doVerify(){
  const otp=getOTP();if(otp.length<6){toast('Enter all 6 digits','error');return;}
  const btn=document.getElementById('verify-btn');btn.disabled=true;btn.textContent='Verifying…';
  const d=await api('POST','/auth/verify-otp',{email,otp});
  btn.disabled=false;btn.textContent='Verify OTP →';
  if(d.success){saveAuth(d);toast('Email verified! Welcome 🎉','success');setTimeout(()=>{if(d.role==='admin')location.href='/admin';else if(d.role==='recruiter')location.href='/recruiter';else location.href='/candidate';},800);}
  else toast(d.message||'Invalid OTP','error');
}
async function resend(){const d=await api('POST','/auth/forgot-password',{email});toast(d.success?'OTP resent!':'Failed to resend',d.success?'success':'error');if(d.dev_otp)toast('Dev OTP: '+d.dev_otp,'info');}
</script>
</body>
</html>
