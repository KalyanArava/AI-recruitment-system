<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset Password — Smart AI Recruitment</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/glass.css">
</head>
<body>
<div class="orb orb-1"></div><div class="orb orb-2"></div>
<div class="g-auth-page">
  <div class="g-auth-box" style="max-width:420px;width:100%">
    <div id="step1">
      <div style="font-size:48px;text-align:center;margin-bottom:16px">🔐</div>
      <div class="auth-title" style="text-align:center">Forgot Password?</div>
      <div class="auth-sub" style="text-align:center">Enter your email to receive a reset OTP</div>
      <div class="g-form-group" style="margin-top:24px"><label>Email Address</label><input type="email" id="fp-email" class="g-input" placeholder="you@example.com"></div>
      <button class="btn-glass btn-primary btn-block btn-lg" onclick="sendOTP()">Send Reset OTP →</button>
      <div class="auth-link"><a href="/login">← Back to login</a></div>
    </div>
    <div id="step2" style="display:none">
      <div style="font-size:48px;text-align:center;margin-bottom:16px">✉️</div>
      <div class="auth-title" style="text-align:center">Enter OTP</div>
      <div class="auth-sub" style="text-align:center">Sent to <span id="fp-email-show" style="color:var(--cyan)"></span></div>
      <div class="otp-row">
        <input type="text" maxlength="1" class="otp-inp rp-inp">
        <input type="text" maxlength="1" class="otp-inp rp-inp">
        <input type="text" maxlength="1" class="otp-inp rp-inp">
        <input type="text" maxlength="1" class="otp-inp rp-inp">
        <input type="text" maxlength="1" class="otp-inp rp-inp">
        <input type="text" maxlength="1" class="otp-inp rp-inp">
      </div>
      <div class="g-form-group"><label>New Password</label><input type="password" id="new-pass" class="g-input" placeholder="New password"></div>
      <div class="g-form-group"><label>Confirm New Password</label><input type="password" id="conf-pass" class="g-input" placeholder="Repeat password"></div>
      <button class="btn-glass btn-primary btn-block btn-lg" onclick="doReset()">Reset Password →</button>
    </div>
  </div>
</div>
<script src="/static/js/glass-app.js"></script>
<script>
let resetEmail='';
const rpInps=[...document.querySelectorAll('.rp-inp')];
rpInps.forEach((inp,i)=>{
  inp.addEventListener('input',()=>{inp.value=inp.value.replace(/\D/g,'');if(inp.value&&i<5)rpInps[i+1].focus();});
  inp.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!inp.value&&i>0)rpInps[i-1].focus();});
});
async function sendOTP(){
  resetEmail=document.getElementById('fp-email').value.trim();
  if(!resetEmail){toast('Enter your email','error');return;}
  const d=await api('POST','/auth/forgot-password',{email:resetEmail});
  if(d.success){document.getElementById('step1').style.display='none';document.getElementById('step2').style.display='block';document.getElementById('fp-email-show').textContent=resetEmail;toast('OTP sent!','success');if(d.dev_otp)toast('Dev OTP: '+d.dev_otp,'info');}
  else toast(d.message||'Email not found','error');
}
async function doReset(){
  const otp=rpInps.map(i=>i.value).join(''),newPass=document.getElementById('new-pass').value,confPass=document.getElementById('conf-pass').value;
  if(otp.length<6){toast('Enter complete OTP','error');return;}
  if(newPass!==confPass){toast('Passwords do not match','error');return;}
  const d=await api('POST','/auth/reset-password',{email:resetEmail,otp,new_password:newPass});
  if(d.success){toast('Password reset! Please login','success');setTimeout(()=>location.href='/login',1000);}
  else toast(d.message||'Reset failed','error');
}
</script>
</body>
</html>
